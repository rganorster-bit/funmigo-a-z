<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FUNMIGO - Random Letter</title>

<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#1e63ff,#06194f 55%,#050505);color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.card{width:min(92vw,460px);background:rgba(0,0,0,.75);border:4px solid #ffcc00;border-radius:28px;padding:28px 20px;box-shadow:0 14px 35px rgba(0,0,0,.45)}
h1{margin:0 0 10px;color:#ffcc00;font-size:42px;text-shadow:4px 4px #000;line-height:.95}p{font-size:18px}.big{font-size:clamp(90px,36vw,190px);font-weight:900;color:#ffcc00;text-shadow:6px 6px #000;margin:25px 0}.word{font-size:clamp(34px,12vw,62px);font-weight:900;color:#ffcc00;text-shadow:4px 4px #000;margin:25px 0;line-height:1.05}
button{width:100%;border:0;border-radius:18px;padding:17px;margin:9px 0;font-size:21px;font-weight:900;background:#ffcc00;color:#111;box-shadow:0 5px 0 rgba(0,0,0,.35)}button:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.35)}.red{background:#ff2b2b;color:white}.blue{background:#0057ff;color:white}.footer{margin-top:16px;font-weight:900}
</style>

</head>
<body>
<div class="card">
<h1>FUNMIGO</h1>
<h2>Random Letter</h2>
<div id="value" class="big">A</div><button class="blue" onclick="newLetter()">NEW LETTER</button>
<div class="footer">LET'S FUNMIGO</div>
</div>
<script>
const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");function pick(a){return a[Math.floor(Math.random()*a.length)]}function newLetter(){document.getElementById("value").textContent=pick(letters)}newLetter();
</script>
</body>
</html>
