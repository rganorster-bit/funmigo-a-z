<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FUNMIGO QR Tools</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#1464ff;

color:white;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.container{

width:95%;

max-width:450px;

text-align:center;

}

h1{

font-size:48px;

margin-bottom:10px;

}

h2{

margin-bottom:25px;

}

button{

width:100%;

padding:18px;

margin:8px 0;

border:none;

border-radius:18px;

font-size:22px;

font-weight:bold;

cursor:pointer;

}

.blue{background:#ffffff;color:#1464ff;}

.yellow{background:#ffd400;color:black;}

.red{background:#ff3a3a;color:white;}

.tool{

display:none;

}

.big{

font-size:180px;

font-weight:bold;

margin:30px 0;

}

.word{

font-size:55px;

font-weight:bold;

margin:30px 0;

}

.small{

font-size:18px;

margin-bottom:20px;

}

.back{

background:black;

color:white;

}

</style>

</head>

<body>

<div class="container">

<div id="home">

<h1>FUNMIGO</h1>

<h2>QR TOOLS</h2>

<button class="blue" onclick="openTool('letter')">Random Letter</button>

<button class="yellow" onclick="openTool('number')">Random Number</button>

<button class="yellow" onclick="openTool('song')">Song Sprint</button>

<button class="red" onclick="openTool('broken')">Broken Sentences</button>

<button class="yellow" onclick="openTool('wrong')">Wrong Answers Only</button>

<button class="blue" onclick="openTool('who')">Who Am I?</button>

<button class="red" onclick="openTool('timer')">Timer</button>

</div>
<div id="letter" class="tool">
  <h1>Random Letter</h1>
  <div id="letterValue" class="big">A</div>
  <button class="blue" onclick="newLetter()">NEW LETTER</button>
  <button class="back" onclick="goHome()">BACK</button>
</div>

<div id="number" class="tool">
  <h1>Random Number</h1>
  <div id="numberValue" class="big">7</div>
  <button class="yellow" onclick="newNumber()">NEW NUMBER</button>
  <button class="back" onclick="goHome()">BACK</button>
</div>

<div id="song" class="tool">
  <h1>Song Sprint</h1>
  <p class="small">Find songs with this word.</p>
  <div id="songValue" class="word">LOVE</div>
  <button class="yellow" onclick="newSongWord()">NEW WORD</button>
  <button class="back" onclick="goHome()">BACK</button>
</div>

<div id="broken" class="tool">
  <h1>Broken Sentences</h1>
  <p class="small">Fix the spaces. Say it out loud.</p>
  <div id="brokenValue" class="word">GOO DNIGHT</div>
  <button class="red" onclick="newBrokenSentence()">NEW SENTENCE</button>
  <button class="back" onclick="goHome()">BACK</button>
</div>

<div id="wrong" class="tool">
  <h1>Wrong Answers Only</h1>
  <p class="small">Answer with total lies!</p>
  <div id="wrongValue" class="word">What color is the sky?</div>
  <button class="yellow" onclick="newWrongQuestion()">NEW QUESTION</button>
  <button class="back" onclick="goHome()">BACK</button>
</div>
<div id="who" class="tool">

<h1>Who Am I?</h1>

<p class="small">Guess the famous person.</p>

<div id="whoValue" class="word">Lionel Messi</div>

<button class="blue" onclick="newCelebrity()">NEW PERSON</button>

<button class="back" onclick="goHome()">BACK</button>

</div>


<div id="timer" class="tool">

<h1>Timer</h1>

<div id="timerValue" class="big">60</div>

<button class="yellow" onclick="startTimer(30)">30 Seconds</button>

<button class="yellow" onclick="startTimer(60)">60 Seconds</button>

<button class="red" onclick="startTimer(90)">90 Seconds</button>

<button class="back" onclick="goHome()">BACK</button>

</div>

</div>

<script>

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

const songWords=[
"LOVE","BABY","FIRE","DREAM","HEART",
"NIGHT","PARTY","WORLD","TIME","RAIN",
"LIGHT","HOME","FRIEND","DANCE","HAPPY"
];

const celebrities=[
"Lionel Messi",
"Cristiano Ronaldo",
"Michael Jordan",
"Taylor Swift",
"Beyoncé",
"LeBron James",
"Tom Cruise",
"Rihanna",
"Eminem",
"MrBeast",
"David Beckham",
"Michael Jackson",
"Bill Gates",
"Elon Musk",
"Oprah Winfrey"
];

const wrongQuestions=[
"What color is the sky?",
"How many legs does a dog have?",
"What do fish live in?",
"What do you drink?",
"What month comes after January?",
"What do bees make?",
"What do you sleep on?",
"What sound does a cow make?"
];

const brokenSentences=[
"GOO DNIGTHI LLS EEYOU TOMM OROW",
"WEA REHAV INGSO MUCHF UN",
"THE DOGI SWAI TING OUTS IDE",
"LETS PLA YONE MOREG AME",
"DONTTO UCHTH EWALL"
];
function hideAll(){

document.getElementById("home").style.display="none";

document.querySelectorAll(".tool").forEach(t=>t.style.display="none");

}

function openTool(id){

hideAll();

document.getElementById(id).style.display="block";

if(id=="letter")newLetter();

if(id=="number")newNumber();

if(id=="song")newSongWord();

if(id=="who")newCelebrity();

if(id=="wrong")newWrongQuestion();

if(id=="broken")newBrokenSentence();

}

function goHome(){

document.querySelectorAll(".tool").forEach(t=>t.style.display="none");

document.getElementById("home").style.display="block";

}

function randomItem(arr){

return arr[Math.floor(Math.random()*arr.length)];

}

function newLetter(){

document.getElementById("letterValue").innerHTML=randomItem(letters);

}

function newNumber(){

document.getElementById("numberValue").innerHTML=Math.floor(Math.random()*90)+10;

}

function newSongWord(){

document.getElementById("songValue").innerHTML=randomItem(songWords);

}

function newCelebrity(){

document.getElementById("whoValue").innerHTML=randomItem(celebrities);

}

function newWrongQuestion(){

document.getElementById("wrongValue").innerHTML=randomItem(wrongQuestions);

}

function newBrokenSentence(){

document.getElementById("brokenValue").innerHTML=randomItem(brokenSentences);

}

let timer;

function startTimer(seconds){

clearInterval(timer);

let time=seconds;

document.getElementById("timerValue").innerHTML=time;

timer=setInterval(function(){

time--;

document.getElementById("timerValue").innerHTML=time;

if(time<=0){

clearInterval(timer);

alert("TIME'S UP!");

}

},1000);

}

</script>

</body>

</html>
